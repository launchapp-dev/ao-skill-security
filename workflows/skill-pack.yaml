phases:
  ao.security-implement:
    mode: agent
    agent: ao.security-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  ao.security.dependency-audit:
    mode: agent
    agent: ao.security.dependency-auditor
    directive: "Run npm audit to scan dependencies for known CVEs and security vulnerabilities. Extract detailed CVE information, analyze severity and exploitability, assess dependency trees for transitive vulnerabilities, and generate a structured JSON report with remediation commands and version upgrade recommendations. Include CVSS scores, CVE references, and breaking change assessments."
    capabilities:
      reads_code: false
      produces_artifacts: true
      security_scanning: true
      dependency_analysis: true
      network_access: true
    timeout_secs: 600

  ao.security.sqli-scan:
    mode: agent
    agent: ao.security.sqli-scanner
    directive: "Scan the codebase for SQL injection vulnerabilities. Analyze all source files, detect unsafe query patterns, trace user input to database operations, and generate a structured JSON report with findings categorized by severity. Include file paths, line numbers, code snippets, and remediation guidance for each vulnerability."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
    timeout_secs: 600

workflows:
  - id: ao.security/standard
    name: "ao-skill-security Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/quick-fix
    name: "ao-skill-security Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.security-implement
      - push-branch
      - create-pr

  - id: ao.security/sqli-scan
    name: "SQL Injection Scanner"
    description: "Scan codebase for SQL injection vulnerabilities and generate security report"
    phases:
      - ao.security.sqli-scan

  - id: ao.security/sqli-scan-and-fix
    name: "SQL Injection Scan and Remediate"
    description: "Scan for SQL injection vulnerabilities → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.sqli-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/dependency-audit
    name: "Dependency Security Audit"
    description: "Audit npm dependencies for known CVEs and security vulnerabilities"
    phases:
      - ao.security.dependency-audit

  - id: ao.security/dependency-audit-and-fix
    name: "Dependency Audit and Remediate"
    description: "Audit dependencies for CVEs → Review findings → Update packages → Push → PR"
    phases:
      - ao.security.dependency-audit
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review
