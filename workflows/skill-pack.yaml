phases:
  ao.security-implement:
    mode: agent
    agent: ao.security-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  ao.security.dependency-audit:
    mode: agent
    agent: ao.security.dependency-auditor
    directive: "Run npm audit to scan dependencies for known CVEs and security vulnerabilities. Extract detailed CVE information, analyze severity and exploitability, assess dependency trees for transitive vulnerabilities, and generate a structured JSON report with remediation commands and version upgrade recommendations. Include CVSS scores, CVE references, and breaking change assessments."
    capabilities:
      reads_code: false
      produces_artifacts: true
      security_scanning: true
      dependency_analysis: true
      network_access: true
    timeout_secs: 600

  ao.security.generate-report:
    mode: agent
    agent: ao.security.report-generator
    directive: "Collect security scanner findings and generate structured reports in JSON and SARIF formats. Aggregate findings from all scanners, deduplicate, enrich with code context and compliance mapping, and produce CI/CD-compatible output with appropriate exit codes."
    capabilities:
      produces_artifacts: true
      report_generation: true
      data_aggregation: true
    timeout_secs: 300

  ao.security.sqli-scan:
    mode: agent
    agent: ao.security.sqli-scanner
    directive: "Scan the codebase for SQL injection vulnerabilities. Analyze all source files, detect unsafe query patterns, trace user input to database operations, and generate a structured JSON report with findings categorized by severity. Include file paths, line numbers, code snippets, and remediation guidance for each vulnerability."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
    timeout_secs: 600

  ao.security.deserialization-scan:
    mode: agent
    agent: ao.security.deserialization-scanner
    directive: "Scan the codebase for unsafe deserialization patterns, insecure pickle/yaml.loads usage, YAML unsafe loading, JavaScript prototype pollution vulnerabilities, and unsafe deserialization in Java, Ruby, .NET, and PHP. Analyze all source files, detect dangerous patterns, trace user input to deserialization sinks, and generate a structured JSON report with findings categorized by severity (Critical/High/Medium/Low/Info) including file paths, line numbers, code snippets, and remediation guidance for each vulnerability."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
      static_analysis: true
    timeout_secs: 600

  ao.security.container-scan:
    mode: agent
    agent: ao.security.container-scanner
    directive: "Scan Dockerfiles, docker-compose.yml, and container configuration files for security vulnerabilities and misconfigurations. Detect exposed Docker sockets, running as root, missing HEALTHCHECK, use of :latest tags, privilege escalation patterns, sensitive volume mounts, insecure base images, and missing resource limits. Generate a structured JSON report with findings categorized by severity (Critical/High/Medium/Low/Info) including file paths, line numbers, code snippets, and remediation guidance."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
      static_analysis: true
    timeout_secs: 600

  ao.security.ssrf-scan:
    mode: agent
    agent: ao.security.ssrf-scanner
    directive: "Scan the codebase for Server-Side Request Forgery (SSRF) vulnerabilities. Analyze all source files, detect unsafe URL handling patterns, trace user input to HTTP request operations, identify access to internal/cloud metadata endpoints, and generate a structured JSON report with findings categorized by severity. Include file paths, line numbers, code snippets, and remediation guidance for each vulnerability."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
      static_analysis: true
    timeout_secs: 600

  ao.security.xss-scan:
    mode: agent
    agent: ao.security.xss-scanner
    directive: "Scan the codebase for Cross-Site Scripting (XSS) vulnerabilities. Analyze all source files, detect dangerous DOM manipulation patterns (innerHTML, dangerouslySetInnerHTML), unsafe eval/Function usage, template injection vectors, and improper sanitization. Generate a structured JSON report with findings categorized by severity. Include file paths, line numbers, code snippets, and remediation guidance for each vulnerability."
    capabilities:
      reads_code: true
      produces_artifacts: true
      security_scanning: true
      static_analysis: true
    timeout_secs: 600

workflows:
  - id: ao.security/standard
    name: "ao-skill-security Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/quick-fix
    name: "ao-skill-security Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.security-implement
      - push-branch
      - create-pr

  - id: ao.security/sqli-scan
    name: "SQL Injection Scanner"
    description: "Scan codebase for SQL injection vulnerabilities and generate security report"
    phases:
      - ao.security.sqli-scan

  - id: ao.security/sqli-scan-and-fix
    name: "SQL Injection Scan and Remediate"
    description: "Scan for SQL injection vulnerabilities → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.sqli-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/dependency-audit
    name: "Dependency Security Audit"
    description: "Audit npm dependencies for known CVEs and security vulnerabilities"
    phases:
      - ao.security.dependency-audit

  - id: ao.security/dependency-audit-and-fix
    name: "Dependency Audit and Remediate"
    description: "Audit dependencies for CVEs → Review findings → Update packages → Push → PR"
    phases:
      - ao.security.dependency-audit
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/scan-and-report
    name: "Security Scan and Report"
    description: "Run all security scanners → Generate structured reports in JSON and SARIF formats"
    phases:
      - ao.security.sqli-scan
      - ao.security.container-scan
      - ao.security.generate-report

  - id: ao.security/full-audit
    name: "Full Security Audit"
    description: "Comprehensive security scan → Generate reports → Review → Fix → Push → PR"
    phases:
      - ao.security.sqli-scan
      - ao.security.container-scan
      - ao.security.generate-report
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/report-only
    name: "Generate Security Report"
    description: "Generate structured security report from existing scanner findings"
    phases:
      - ao.security.generate-report

  - id: ao.security/deserialization-scan
    name: "Unsafe Deserialization Scanner"
    description: "Scan codebase for unsafe deserialization patterns, insecure pickle/yaml.loads usage, and JavaScript prototype pollution vulnerabilities"
    phases:
      - ao.security.deserialization-scan

  - id: ao.security/deserialization-scan-and-fix
    name: "Unsafe Deserialization Scan and Remediate"
    description: "Scan for unsafe deserialization and prototype pollution → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.deserialization-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/container-scan
    name: "Container Security Scan"
    description: "Scan Dockerfiles and docker-compose files for container security vulnerabilities"
    phases:
      - ao.security.container-scan

  - id: ao.security/container-scan-and-fix
    name: "Container Security Scan and Remediate"
    description: "Scan for container security issues → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.container-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review


  - id: ao.security/ssrf-scan
    name: "SSRF Scanner"
    description: "Scan codebase for Server-Side Request Forgery (SSRF) vulnerabilities and generate security report"
    phases:
      - ao.security.ssrf-scan

  - id: ao.security/ssrf-scan-and-fix
    name: "SSRF Scan and Remediate"
    description: "Scan for SSRF vulnerabilities → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.ssrf-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.security/xss-scan
    name: "XSS Scanner"
    description: "Scan codebase for Cross-Site Scripting (XSS) vulnerabilities and generate security report"
    phases:
      - ao.security.xss-scan

  - id: ao.security/xss-scan-and-fix
    name: "XSS Scan and Remediate"
    description: "Scan for XSS vulnerabilities → Review findings → Implement fixes → Push → PR"
    phases:
      - ao.security.xss-scan
      - ao.security-implement
      - push-branch
      - create-pr
      - pr-review
