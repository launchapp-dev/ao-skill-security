schema = "ao.pack.v1"
id = "ao.security"
version = "0.1.0"
kind = "skill-pack"
title = "ao-skill-security"
description = "Scan for OWASP top 10, CVEs, hardcoded secrets, auth misconfigurations, SQL injection, SSRF, container security"

[ownership]
mode = "community"
author = "launchapp-dev"
repo = "https://github.com/launchapp-dev/ao-skill-security"

[compatibility]
ao_core = ">=0.2.0"
workflow_schema = "v2"

[workflows]
root = "workflows"
exports = [
  "ao.security/standard",
  "ao.security/quick-fix",
  "ao.security/sqli-scan",
  "ao.security/sqli-scan-and-fix",
  "ao.security/dependency-audit",
  "ao.security/dependency-audit-and-fix",
  "ao.security/container-scan",
  "ao.security/container-scan-and-fix",
  "ao.security/deserialization-scan",
  "ao.security/deserialization-scan-and-fix",
  "ao.security/scan-and-report",
  "ao.security/full-audit",
  "ao.security/report-only",
  "ao.security/ssrf-scan",
  "ao.security/ssrf-scan-and-fix",
  "ao.security/xss-scan",
  "ao.security/xss-scan-and-fix",
  "ao.security/command-injection-scan",
  "ao.security/command-injection-scan-and-fix",
  "ao.security/hardcoded-secrets-scan",
  "ao.security/hardcoded-secrets-scan-and-fix",
]

[runtime]
agent_overlay = "runtime/agents.yaml"

[permissions]
tools = ["ao", "github"]

[skills]
sqli_scanner = { path = "skills/sqli-scanner.md", description = "SQL injection vulnerability detection via static analysis" }
dependency_auditor = { path = "skills/dependency-auditor.md", description = "npm dependency CVE scanning and security auditing" }
security_report = { path = "skills/security-report.md", description = "Generate structured security reports in JSON and SARIF formats with CI/CD integration" }
container_scanner = { path = "skills/container-security-scanner.md", description = "Dockerfile and docker-compose security analysis for container vulnerabilities" }
ssrf_scanner = { path = "skills/ssrf-scanner.md", description = "SSRF (Server-Side Request Forgery) vulnerability detection via static analysis of URL handling patterns" }
xss_scanner = { path = "skills/xss-scanner.md", description = "XSS (Cross-Site Scripting) vulnerability detection via static analysis of HTML/JS rendering patterns" }
command_injection_scanner = { path = "skills/command-injection-scanner.md", description = "OS command injection vulnerability detection via static analysis of shell command execution patterns" }
hardcoded_secrets_scanner = { path = "skills/hardcoded-secrets-scanner.md", description = "Hardcoded secrets detection via static analysis of passwords, API keys, tokens, SSH keys, and connection strings" }
