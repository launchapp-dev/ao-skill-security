schema = "ao.pack.v1"
id = "ao.security"
version = "0.1.0"
kind = "skill-pack"
title = "ao-skill-security"
description = "Scan for OWASP top 10, CVEs, hardcoded secrets, auth misconfigurations"

[ownership]
mode = "community"
author = "launchapp-dev"
repo = "https://github.com/launchapp-dev/ao-skill-security"

[compatibility]
ao_core = ">=0.2.0"
workflow_schema = "v2"

[workflows]
root = "workflows"
exports = [
  "ao.security/standard",
  "ao.security/quick-fix",
]

[runtime]
agent_overlay = "runtime/agents.yaml"

[permissions]
tools = ["ao", "github"]
